<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent 项目追踪器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            padding: 40px 0;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d9ff, #00ff87);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            color: #8892b0;
            font-size: 1.1rem;
        }
        .last-updated {
            color: #64ffda;
            margin-top: 10px;
            font-size: 0.9rem;
        }
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        .stat-item {
            background: rgba(255,255,255,0.05);
            padding: 20px 30px;
            border-radius: 12px;
            text-align: center;
            min-width: 150px;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #00d9ff;
        }
        .stat-label {
            color: #8892b0;
            margin-top: 5px;
        }
        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 30px 0;
        }
        .tab {
            padding: 12px 24px;
            background: rgba(255,255,255,0.05);
            border: none;
            border-radius: 8px;
            color: #8892b0;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .tab.active {
            background: linear-gradient(90deg, #00d9ff, #00ff87);
            color: #1a1a2e;
            font-weight: bold;
        }
        .tab:hover:not(.active) {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .project-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s;
        }
        .project-card:hover {
            transform: translateY(-5px);
            border-color: #00d9ff;
            box-shadow: 0 10px 40px rgba(0,217,255,0.1);
        }
        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        .project-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            text-decoration: none;
        }
        .project-name:hover {
            color: #00d9ff;
        }
        .project-language {
            background: rgba(0,217,255,0.2);
            color: #00d9ff;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        .project-description {
            color: #8892b0;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 15px;
            min-height: 50px;
        }
        .project-stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .project-stat {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #64ffda;
            font-size: 0.9rem;
        }
        .project-stat svg {
            width: 16px;
            height: 16px;
        }
        .trend {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-left: 8px;
        }
        .trend.up {
            background: rgba(0,255,135,0.2);
            color: #00ff87;
        }
        .trend.down {
            background: rgba(255,100,100,0.2);
            color: #ff6464;
        }
        .section-title {
            font-size: 1.5rem;
            margin: 40px 0 20px;
            color: #fff;
        }
        .loading {
            text-align: center;
            padding: 60px;
            color: #8892b0;
        }
        .error {
            text-align: center;
            padding: 60px;
            color: #ff6464;
            background: rgba(255,100,100,0.1);
            border-radius: 12px;
            margin: 20px 0;
        }
        footer {
            text-align: center;
            padding: 40px 0;
            color: #8892b0;
            font-size: 0.9rem;
        }
        footer a {
            color: #00d9ff;
            text-decoration: none;
        }
        @media (max-width: 768px) {
            .projects-grid {
                grid-template-columns: 1fr;
            }
            .stats-bar {
                gap: 15px;
            }
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 AI Agent 项目追踪器</h1>
            <p class="subtitle">追踪 GitHub 上最新、最活跃的 AI Agent 开源项目</p>
            <p class="last-updated" id="lastUpdated">加载中...</p>
        </header>

        <div class="stats-bar" id="statsBar">
            <div class="stat-item">
                <div class="stat-value" id="totalProjects">-</div>
                <div class="stat-label">追踪项目</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="totalStars">-</div>
                <div class="stat-label">总 Stars</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="newProjects">-</div>
                <div class="stat-label">今日新增</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="risingProjects">-</div>
                <div class="stat-label">活跃上升</div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" data-filter="all">🔥 热门项目</button>
            <button class="tab" data-filter="trending">📈 活跃上升</button>
            <button class="tab" data-filter="new">✨ 最新创建</button>
        </div>

        <div id="projectsContainer" class="projects-grid">
            <div class="loading">正在加载项目数据...</div>
        </div>

        <footer>
            <p>数据来源: <a href="https://github.com" target="_blank">GitHub API</a> | 每日自动更新</p>
            <p style="margin-top: 10px;">由 GitHub Actions + Pages 驱动</p>
        </footer>
    </div>

    <script>
        // 项目数据
        let projectsData = {
            lastUpdated: '',
            projects: []
        };

        // 图标 SVG
        const icons = {
            star: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>',
            fork: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 2C4.9 2 4 2.9 4 4v10c0 1.1.9 2 2 2h4v2.59L7.41 15l3.59 3.59L14.59 15l-2.59-2.59V20h4c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2H6z"/></svg>',
            issue: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>'
        };

        // 格式化数字
        function formatNumber(num) {
            if (num >= 1000) {
                return (num / 1000).toFixed(1) + 'k';
            }
            return num.toString();
        }

        // 渲染项目卡片
        function renderProjectCard(project) {
            const trendClass = project.trend >= 0 ? 'up' : 'down';
            const trendSymbol = project.trend >= 0 ? '↑' : '↓';
            const trendValue = Math.abs(project.trend).toFixed(1);
            
            return `
                <div class="project-card">
                    <div class="project-header">
                        <a href="${project.url}" target="_blank" class="project-name">${project.name}</a>
                        ${project.language ? `<span class="project-language">${project.language}</span>` : ''}
                    </div>
                    <p class="project-description">${project.description || '暂无描述'}</p>
                    <div class="project-stats">
                        <span class="project-stat">${icons.star} ${formatNumber(project.stars)}</span>
                        <span class="project-stat">${icons.fork} ${formatNumber(project.forks)}</span>
                        <span class="project-stat">${icons.issue} ${formatNumber(project.issues)}</span>
                        <span class="trend ${trendClass}">${trendSymbol} ${trendValue}%</span>
                    </div>
                </div>
            `;
        }

        // 渲染项目列表
        function renderProjects(filter = 'all') {
            const container = document.getElementById('projectsContainer');
            let filtered = projectsData.projects;

            if (filter === 'trending') {
                filtered = projectsData.projects.filter(p => p.trend > 0).sort((a, b) => b.trend - a.trend);
            } else if (filter === 'new') {
                filtered = [...projectsData.projects].sort((a, b) => new Date(b.created) - new Date(a.created));
            } else {
                filtered = [...projectsData.projects].sort((a, b) => b.stars - a.stars);
            }

            if (filtered.length === 0) {
                container.innerHTML = '<div class="loading">暂无数据</div>';
                return;
            }

            container.innerHTML = filtered.map(renderProjectCard).join('');
        }

        // 更新统计信息
        function updateStats() {
            const total = projectsData.projects.length;
            const totalStars = projectsData.projects.reduce((sum, p) => sum + p.stars, 0);
            const newToday = projectsData.projects.filter(p => p.isNew).length;
            const rising = projectsData.projects.filter(p => p.trend > 0).length;

            document.getElementById('totalProjects').textContent = total;
            document.getElementById('totalStars').textContent = formatNumber(totalStars);
            document.getElementById('newProjects').textContent = newToday;
            document.getElementById('risingProjects').textContent = rising;
            document.getElementById('lastUpdated').textContent = `最后更新: ${projectsData.lastUpdated}`;
        }

        // 标签切换
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                renderProjects(tab.dataset.filter);
            });
        });

        // 加载数据
        async function loadData() {
            try {
                const response = await fetch('data/projects.json');
                if (!response.ok) throw new Error('Failed to load data');
                projectsData = await response.json();
                updateStats();
                renderProjects();
            } catch (error) {
                document.getElementById('projectsContainer').innerHTML = 
                    `<div class="error">加载数据失败: ${error.message}<br>请稍后重试</div>`;
            }
        }

        // 页面加载
        loadData();
    </script>
</body>
</html>
