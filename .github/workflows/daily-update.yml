name: Daily AI Agent Projects Update

on:
  schedule:
    # 每天早上 8:00 UTC (北京时间 16:00) 运行
    - cron: '0 8 * * *'
  workflow_dispatch:
    # 支持手动触发

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          sparse-checkout: |
            data
            src
            .github
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch AI Agent projects
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python src/fetch_projects.py

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/appcanmr/ai-agent-tracker.git
          git add data/projects.json
          git diff --staged --quiet && exit 0
          git -c user.name='github-actions[bot]' -c user.email='action@github.com' commit -m "Update AI Agent projects - $(date +'%Y-%m-%d %H:%M:%S')"
          git push
