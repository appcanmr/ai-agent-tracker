name: Daily AI Agent Projects Update

on:
  schedule:
    # 每天早上 8:00 UTC (北京时间 16:00) 运行
    - cron: '0 8 * * *'
  workflow_dispatch:
    # 支持手动触发
  push:
    branches:
      - main

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch AI Agent projects
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python src/fetch_projects.py

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/projects.json
          git diff --staged --quiet || git commit -m "Update AI Agent projects - $(date +'%Y-%m-%d %H:%M:%S')"

      - name: Push changes
        run: |
          git push
